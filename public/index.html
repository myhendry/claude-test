<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    h1 { font-size: 1.6rem; margin-bottom: 24px; }

    .card {
      background: white;
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: #4f46e5; }

    button {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .message {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }

    .message.success { background: #d1fae5; color: #065f46; display: block; }
    .message.error   { background: #fee2e2; color: #991b1b; display: block; }

    h2 { font-size: 1.1rem; margin-bottom: 16px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
    }

    th { color: #666; font-weight: 600; background: #fafafa; }
    tr:last-child td { border-bottom: none; }

    .empty { color: #999; font-size: 0.9rem; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact Form</h1>

    <div class="card">
      <form id="contactForm">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Jane Doe" required />

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="jane@example.com" required />

        <button type="submit" id="submitBtn">Submit</button>
        <div class="message" id="message"></div>
      </form>
    </div>

    <div class="card">
      <h2>Submitted Contacts</h2>
      <div id="contactList"><p class="empty">No contacts yet.</p></div>
    </div>
  </div>

  <script>
    async function loadContacts() {
      const res = await fetch('/api/contacts');
      const contacts = await res.json();
      const el = document.getElementById('contactList');

      if (!contacts.length) {
        el.innerHTML = '<p class="empty">No contacts yet.</p>';
        return;
      }

      el.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Submitted</th></tr></thead>
          <tbody>
            ${contacts.map((c, i) => `
              <tr>
                <td>${i + 1}</td>
                <td>${escapeHtml(c.name)}</td>
                <td>${escapeHtml(c.email)}</td>
                <td>${new Date(c.created_at).toLocaleString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;

      btn.disabled = true;
      msg.className = 'message';
      msg.textContent = '';

      try {
        const res = await fetch('/api/contacts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email }),
        });
        const data = await res.json();

        if (res.ok) {
          msg.textContent = `Saved! Welcome, ${data.name}.`;
          msg.className = 'message success';
          e.target.reset();
          loadContacts();
        } else {
          msg.textContent = data.error;
          msg.className = 'message error';
        }
      } catch {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'message error';
      } finally {
        btn.disabled = false;
      }
    });

    loadContacts();
  </script>
</body>
</html>
